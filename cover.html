        /* Running Text */
       .marquee {
    width: 100%;
    background: black;
    color: white;
    padding: 10px 0;
    font-weight: bold;
    overflow: hidden;
    position: relative;
}

.marquee span {
    display: inline-block;
    white-space: nowrap;
    padding-left: 100%;
    animation: scrollText 25s linear infinite;
}

@keyframes scrollText {
    0% { transform: translateX(0); }
    100% { transform: translateX(-100%); }
}

       /* ===== 3D CALENDAR ===== */

.calendar {
    position: absolute;
    top: 50%;
    left: 30px;
    width: 280px;
    padding: 25px;

    background: linear-gradient(145deg, #ffffff, #e6e6e6);
    border-radius: 20px;

    box-shadow: 
        15px 15px 30px rgba(0,0,0,0.4),
        -10px -10px 25px rgba(255,255,255,0.6);

    transform: perspective(1000px) rotateY(-8deg);
    transition: 0.5s ease;
}

.calendar:hover {
    transform: perspective(1000px) rotateY(0deg) scale(1.03);
}

/* Header */
.cal-header {
    text-align: center;
    font-weight: bold;
    font-size: 20px;
    margin-bottom: 15px;
    color: #222;
    text-shadow: 1px 1px 2px rgba(0,0,0,0.2);
}

/* Days grid */
.cal-days {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    text-align: center;
    gap: 8px;
    font-size: 14px;
}

/* Day names */
.day-name {
    font-weight: bold;
    color: #333;
}

/* Date cells */
.cal-days div {
    padding: 6px 0;
    border-radius: 8px;
    transition: 0.3s;
}

/* Hover 3D effect */
.cal-days div:hover {
    background: #1e90ff;
    color: white;
    transform: translateY(-5px);
    box-shadow: 0 8px 15px rgba(0,0,0,0.3);
    cursor: pointer;
}

/* Today highlight */
.today {
    background: linear-gradient(to bottom,#1e90ff,#0056b3);
    color: white;
    font-weight: bold;
    box-shadow: 
        0 0 10px #1e90ff,
        0 0 20px rgba(30,144,255,0.6);
}

        .cal-header {
            text-align: center;
            font-weight: bold;
            font-size: 18px;
            margin-bottom: 10px;
        }

        .cal-days {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            text-align: center;
            gap: 5px;
            font-size: 14px;
        }

        .day-name {
            font-weight: bold;
            color: #333;
        }

        .today {
            background: #1e90ff;
            color: white;
            border-radius: 6px;
            font-weight: bold;
        }

        /* Center Buttons */
        .content {
            position: absolute;
            top: 65%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
        }

        .btn {
            display: block;
            width: 240px;
            margin: 20px auto;
            padding: 14px;
            font-size: 20px;
            font-weight: bold;
            color: white;
            background: linear-gradient(to bottom,#1e90ff,#0056b3);
            border: none;
            border-radius: 12px;
            cursor: pointer;
            box-shadow: 0 6px 0 #003d80;
            transition: 0.2s;

            text-shadow:
                1px 1px 0 #999,
                2px 2px 0 #666,
                3px 3px 0 #444,
                4px 4px 6px rgba(0,0,0,0.6);
        }

        .btn:active {
            transform: translateY(6px);
            box-shadow: 0 2px 0 #003d80;
        }

        /* Professional Signature */
        .signature {
            position: absolute;
            bottom: 40px;
            right: 40px;
            text-align: right;
            font-size: 20px;
            font-weight: 600;
            color: #f5f5f5;
            letter-spacing: 1px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.7);
        }
/* ===== DIGITAL CLOCK ===== */

.digital-clock {
    position: absolute;
    top: 17px;
    right: 40px;

    padding: 15px 25px;
    font-size: 28px;
    font-weight: bold;
    letter-spacing: 2px;

    color: #00ffcc;
    background: rgba(0,0,0,0.6);
    border-radius: 12px;

    box-shadow:
        0 0 10px #00ffcc,
        0 0 20px rgba(0,255,204,0.5);

    text-shadow:
        0 0 5px #00ffcc,
        0 0 10px #00ffcc;
}

<body>

<div class="marquee">
    <span>
        அருவினை என்ப உளவோ? கருவியான் காலம் அறிந்து செயின்.
    </span>
</div>

<div class="overlay">
<!-- Digital Clock -->
<div class="digital-clock" id="digitalClock"></div>

    <!-- Calendar -->
    <div class="calendar">
        <div class="cal-header" id="monthYear"></div>
        <div class="cal-days" id="calendarDays"></div>
    </div>

    <!-- Buttons -->
    <div class="content">
        <button class="btn" onclick="openG35()">General 35</button>
        <button class="btn" onclick="openOvertime()">Overtime Voucher</button>
    </div>

    <!-- Signature -->
    <div class="signature">
        S. Kajenthiran <br>
        Divisional Secretariat Welioya
    </div>

</div>

<script>
    const monthYear = document.getElementById("monthYear");
    const calendarDays = document.getElementById("calendarDays");

    const today = new Date();
    const currentMonth = today.getMonth();
    const currentYear = today.getFullYear();
    const currentDate = today.getDate();

    const months = [
        "January","February","March","April","May","June",
        "July","August","September","October","November","December"
    ];

    monthYear.innerText = months[currentMonth] + " " + currentYear;

    const firstDay = new Date(currentYear, currentMonth, 1).getDay();
    const daysInMonth = new Date(currentYear, currentMonth + 1, 0).getDate();

    const dayNames = ["Sun","Mon","Tue","Wed","Thu","Fri","Sat"];

    dayNames.forEach(day => {
        const div = document.createElement("div");
        div.innerText = day;
        div.classList.add("day-name");
        calendarDays.appendChild(div);
    });

    for(let i=0; i<firstDay; i++){
        const empty = document.createElement("div");
        calendarDays.appendChild(empty);
    }

    for(let d=1; d<=daysInMonth; d++){
        const dateDiv = document.createElement("div");
        dateDiv.innerText = d;

        if(d === currentDate){
            dateDiv.classList.add("today");
        }

        calendarDays.appendChild(dateDiv);
    }
function openOvertime() {
    window.location.href = "Overtime(Gen35A).html";
}
function openG35() {
    window.location.href = "G35.html";
}
function updateClock() {
    const now = new Date();

    let hours = now.getHours();
    let minutes = now.getMinutes();
    let seconds = now.getSeconds();

    // 12-hour format
    let ampm = hours >= 12 ? "PM" : "AM";
    hours = hours % 12;
    hours = hours ? hours : 12;

    hours = hours < 10 ? "0" + hours : hours;
    minutes = minutes < 10 ? "0" + minutes : minutes;
    seconds = seconds < 10 ? "0" + seconds : seconds;

    const timeString = hours + ":" + minutes + ":" + seconds + " " + ampm;

    document.getElementById("digitalClock").innerText = timeString;
}

setInterval(updateClock, 1000);
updateClock();
</script>
